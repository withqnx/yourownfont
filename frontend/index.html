<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>2026 한글날</title>
<style>
  @font-face { font-family:"Paperlogy"; font-weight:100; src:url("/assets/fonts/Paperlogy-1Thin.ttf") format("truetype"); font-display:swap; }
  @font-face { font-family:"Paperlogy"; font-weight:400; src:url("/assets/fonts/Paperlogy-4Regular.ttf") format("truetype"); font-display:swap; }
  @font-face { font-family:"Paperlogy"; font-weight:500; src:url("/assets/fonts/Paperlogy-5Medium.ttf") format("truetype"); font-display:swap; }
  @font-face { font-family:"Paperlogy"; font-weight:700; src:url("/assets/fonts/Paperlogy-7Bold.ttf") format("truetype"); font-display:swap; }
  @font-face { font-family:"Paperlogy"; font-weight:900; src:url("/assets/fonts/Paperlogy-9Black.ttf") format("truetype"); font-display:swap; }

  :root{
    --canvas:#f5f5f5; --paper:#fff; --surface:#fafafa;
    --ink:#0a0a0a; --ink-soft:#171717; --mid:#737373; --hairline:#e5e5e5; --ember:#e7000b;
    --r-card:24px; --r-btn:18px; --r-nested:10px;
    --font:"Paperlogy", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    /* old-hangul (아래아·ㆆ·ㅸ 등): serif-first so the whole phrase renders in one font */
    --old:"함초롬바탕", "HCR Batang", "AppleMyungjo", "Batang", "Noto Serif KR", "Apple SD Gothic Neo", serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:var(--font); color:var(--ink); background:var(--canvas);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
    padding:24px; position:relative; overflow-x:hidden;
  }
  /* giant faint backdrop behind the floating window */
  .backdrop{position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;}
  .backdrop b{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:var(--font); font-weight:900; font-size:min(62vw,900px); color:#ececec;
    letter-spacing:-.05em; white-space:nowrap; user-select:none;
  }
  .brandmark{position:fixed; top:20px; left:24px; z-index:2; font-weight:900; font-size:14px; letter-spacing:-.02em; color:var(--ink);}
  .brandmark i{color:var(--ember); font-style:normal;}

  /* the floating window */
  .window{
    position:relative; z-index:1; width:100%; max-width:600px; min-height:min(78dvh,680px);
    background:var(--paper); border:1px solid var(--hairline); border-radius:var(--r-card);
    box-shadow:0 1px 2px rgba(0,0,0,.04), 0 12px 40px -12px rgba(0,0,0,.22), 0 0 0 1px rgba(23,23,23,.04);
    padding:40px 40px 32px; display:flex; flex-direction:column;
  }
  @media(max-width:520px){ .window{padding:28px 22px; min-height:82dvh;} body{padding:12px;} }

  .navrow{display:flex; align-items:center; gap:8px; min-height:28px; margin-bottom:20px;}
  .back{background:none; border:0; color:var(--mid); font-family:var(--font); font-size:14px; cursor:pointer; padding:4px 6px; border-radius:8px;}
  .back:hover{background:var(--canvas); color:var(--ink);}
  .crumbs{font-size:13px; color:var(--mid);}
  .crumbs b{color:var(--ink); font-weight:500;}
  .spacer{flex:1;}

  .body{flex:1; display:flex; flex-direction:column;}
  .step{animation:rise .3s cubic-bezier(.2,.7,.2,1); flex:1; display:flex; flex-direction:column;}
  @keyframes rise{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;}}

  .label{font-size:12px; letter-spacing:.08em; color:var(--mid); text-transform:uppercase; margin-bottom:14px;}
  .display{font-weight:900; letter-spacing:-.04em; line-height:1.06; font-size:clamp(32px,7vw,50px);}
  .old{font-family:var(--old);}
  .cover-year{font-weight:100; font-size:clamp(40px,9vw,72px); letter-spacing:-.03em; line-height:1;}
  .cover-day{font-weight:900; font-size:clamp(64px,17vw,140px); letter-spacing:-.05em; line-height:.92;}
  .lead{font-family:var(--old); font-size:18px; color:var(--ink-soft); line-height:1.9; margin-top:20px; word-break:keep-all;}
  .lead .hl{border-bottom:2px solid var(--ember); padding-bottom:1px;}
  .muted{color:var(--mid); font-size:14px;}

  .btn{font-family:var(--font); font-weight:500; font-size:15px; border:0; cursor:pointer; border-radius:var(--r-btn);
    padding:12px 20px; display:inline-flex; align-items:center; gap:8px; text-decoration:none; transition:transform .08s, background .15s;}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--ink); color:#fafafa;} .btn.primary:hover{background:#000;}
  .btn.ghost{background:var(--canvas); color:var(--ink);} .btn.ghost:hover{background:#ececec;}
  .btn.lg{padding:15px 22px; font-size:16px;}
  .btn:disabled{opacity:.45; cursor:default;}
  .foot{margin-top:auto; padding-top:28px;}
  .actions{display:flex; gap:10px; flex-wrap:wrap;}

  .choices{display:flex; flex-direction:column; gap:12px; margin-top:8px;}
  .choice{width:100%; text-align:left; background:var(--paper); border:1px solid var(--hairline); border-radius:var(--r-nested);
    padding:18px 20px; cursor:pointer; transition:border-color .15s, background .15s;}
  .choice:hover{border-color:var(--ink); background:var(--surface);}
  .choice .ct{display:flex; align-items:baseline; justify-content:space-between; gap:12px;}
  .choice .title{font-family:var(--old); font-weight:900; font-size:26px; letter-spacing:-.02em;}
  .choice .num{font-size:12px; color:var(--mid);}
  .choice .sub{color:var(--mid); font-size:13px; margin-top:5px; line-height:1.5; word-break:keep-all;}

  .field{display:flex; flex-direction:column; gap:6px; margin-bottom:14px;}
  .field label{font-size:13px; color:var(--mid);}
  .input,select,textarea{font-family:var(--font); font-size:15px; color:var(--ink); background:var(--canvas);
    border:1px solid transparent; border-radius:var(--r-btn); padding:11px 14px; outline:none; width:100%;}
  .input:focus,select:focus,textarea:focus{border-color:var(--hairline); background:var(--paper);}
  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .subcard{background:var(--surface); border:1px solid var(--hairline); border-radius:var(--r-nested); padding:16px 18px; margin-top:8px;}
  .drop{border:2px dashed var(--hairline); border-radius:var(--r-nested); padding:24px; text-align:center; color:var(--mid); cursor:pointer; font-size:14px;}
  .drop.over{border-color:var(--ink); background:var(--surface);}
  .note{margin-top:12px; padding:11px 14px; border-radius:var(--r-nested); font-size:14px;}
  .note.ok{background:#f0fdf4; border:1px solid #bbf7d0; color:#166534;}
  .note.err{background:#fef2f2; border:1px solid #fecaca; color:#991b1b;}
  .note.info{background:var(--canvas); border:1px solid var(--hairline); color:var(--mid);}
  #preview{font-size:32px; min-height:110px; border:1px dashed var(--hairline); border-radius:var(--r-nested); padding:16px; margin-top:14px; outline:none; line-height:1.6;}
  .sagak-preview{min-height:150px; display:flex; align-items:center; justify-content:center; border:1px solid var(--hairline);
    border-radius:var(--r-nested); background:var(--surface); margin-top:14px; font-weight:900; font-size:clamp(36px,11vw,72px); letter-spacing:-.03em; padding:16px; word-break:keep-all;}
  .soon{display:inline-block; background:var(--ink-soft); color:#fafafa; font-size:12px; padding:3px 10px; border-radius:18px; margin-top:14px;}
</style>
</head>
<body>
  <div class="backdrop"><b class="old">한글</b></div>
  <div class="brandmark">사맛디<i>.</i></div>
  <div class="window"><div class="navrow" id="nav"></div><div class="body" id="stage"></div></div>

<script>
const stage = document.getElementById('stage');
const nav = document.getElementById('nav');
let stack = [];
function go(id, ctx){ stack.push({id, ctx:ctx||{}}); render(); }
function back(){ if(stack.length>1){ stack.pop(); render(); } }
function reset(id){ stack=[{id, ctx:{}}]; render(); }
function cur(){ return stack[stack.length-1]; }
function render(){
  const {id, ctx} = cur();
  const s = STEPS[id](ctx);
  nav.innerHTML = (stack.length>1 ? `<button class="back" onclick="back()">←</button>` : '')
    + `<span class="crumbs">${s.crumb||''}</span>`;
  stage.innerHTML = '';
  const el = document.createElement('div'); el.className='step'; el.innerHTML = s.html;
  stage.appendChild(el);
  if (WIRE[id]) WIRE[id](el, ctx);
}

const STEPS = {
  cover: () => ({ crumb:'', html:`
    <div style="flex:1; display:flex; flex-direction:column; justify-content:center">
      <div class="cover-year">2026</div>
      <div class="cover-day">한글날</div>
      <div class="muted old" style="margin-top:22px; font-size:15px">訓民正音 반포 580年 · 가갸날 100年</div>
    </div>
    <div class="foot"><button class="btn primary lg" onclick="go('preface')">들어가기 →</button></div>`}),

  preface: () => ({ crumb:'訓民正音 언해', html:`
    <div class="label">世宗御製 訓民正音</div>
    <div class="lead old" style="margin-top:0">
      나랏말ᄊᆞ미 中國에 달아<br>
      文字와로 서르 <span class="hl">ᄉᆞᄆᆞᆺ디</span> 아니ᄒᆞᆯᄊᆡ<br>
      이런 젼ᄎᆞ로 어린 百姓이 니르고져 홇 배 이셔도<br>
      ᄆᆞᄎᆞᆷ내 <span class="hl">제 ᄠᅳ들</span> 시러 펴디 몯ᄒᆞᇙ 노미 하니라<br>
      내 이ᄅᆞᆯ 爲ᄒᆞ야 어엿비 너겨<br>
      <span class="hl">날로 ᄡᅮ메 便安킈</span> ᄒᆞ고져 ᄒᆞᇙ ᄯᆞᄅᆞ미니라
    </div>
    <div class="foot"><button class="btn primary lg" onclick="go('hub')">다음 →</button></div>`}),

  hub: () => ({ crumb:'序文', html:`
    <div class="label">세 ᄠᅳ들</div>
    <div class="choices" style="margin-top:2px">
      <button class="choice" onclick="go('samatdi')">
        <div class="ct"><span class="title old">ᄉᆞᄆᆞᆺ디</span><span class="num">通 · 소통</span></div>
        <div class="sub">소리와 문자가 통하다. 손글씨로 폰트를 만들고, 소리를 글자로 옮긴다.</div></button>
      <button class="choice" onclick="go('jetteul')">
        <div class="ct"><span class="title old">제 ᄠᅳ들</span><span class="num">情 · 표현</span></div>
        <div class="sub">마침내 제 뜻을 펴다. 익명의 공간에 하고 싶던 말을 적는다.</div></button>
      <button class="choice" onclick="go('nallo')">
        <div class="ct"><span class="title old">날로 ᄡᅮ메 便安킈</span><span class="num">便 · 편안</span></div>
        <div class="sub">날로 씀에 편안케. 매일 한 글자씩 쓰는 챌린지.</div></button>
    </div>`}),

  samatdi: () => ({ crumb:'序文 › <b class="old">ᄉᆞᄆᆞᆺ디</b>', html:`
    <div class="label">ᄉᆞᄆᆞᆺ디 · 通</div>
    <div class="choices">
      <button class="choice" onclick="go('font_intro')">
        <div class="ct"><span class="title" style="font-family:var(--font)">폰트 만들기</span><span class="num">1</span></div>
        <div class="sub">손글씨가 진짜 폰트(.ttf/.otf)가 된다.</div></button>
      <button class="choice" onclick="go('sagak')">
        <div class="ct"><span class="title" style="font-family:var(--font)">사각사각</span><span class="num">2</span></div>
        <div class="sub">의성어·의태어를 글자 카드로.</div></button>
    </div>`}),

  font_intro: () => ({ crumb:'ᄉᆞᄆᆞᆺ디 › 폰트 만들기', html:`
    <div class="label">1 · 템플릿</div>
    <div class="display">손글씨 쓰기</div>
    <p class="muted" style="margin-top:14px; line-height:1.6">단어·숫자·기호가 적힌 종이를 인쇄해 빈 칸에 쓴다. 자모를 분석해 11,172자를 만든다.</p>
    <div class="subcard row" style="justify-content:space-between">
      <span>템플릿 PDF</span><a class="btn primary" href="/api/template" download>받기</a>
    </div>
    <div class="foot"><button class="btn primary lg" onclick="go('font_upload')">올리기 →</button></div>`}),

  font_upload: () => ({ crumb:'ᄉᆞᄆᆞᆺ디 › 폰트 만들기', html:`
    <div class="label">2 · 스캔</div>
    <div class="display">올리기</div>
    <div style="margin-top:16px">
      <div class="field"><label>이름</label><input class="input" id="family" value="내손글씨" /></div>
      <div class="field"><label>형식</label><select id="fmt"><option value="ttf">TTF</option><option value="otf">OTF</option></select></div>
      <div class="drop" id="drop">모든 쪽 이미지를 끌어놓거나 클릭 (여러 장)</div>
      <input type="file" id="file" accept="image/*" multiple hidden />
      <div class="row" style="margin-top:12px"><button class="btn primary" id="buildBtn" disabled>만들기</button><span class="muted" id="fname"></span></div>
      <div id="status"></div>
    </div>`}),

  font_result: (ctx) => ({ crumb:'ᄉᆞᄆᆞᆺ디 › 폰트 만들기', html:`
    <div class="label">3 · 완성</div>
    <div class="note ok">${ctx.filled}/${ctx.total}칸 · 한글 ${Number(ctx.syllables).toLocaleString()}자</div>
    <div id="preview" contenteditable="true" spellcheck="false">내 손글씨로 만든 한글 0123</div>
    <div class="foot actions"><a class="btn primary lg" href="${ctx.url}" download>내려받기</a><button class="btn ghost" onclick="reset('cover')">처음으로</button></div>`}),

  sagak: () => ({ crumb:'ᄉᆞᄆᆞᆺ디 › 사각사각', html:`
    <div class="label">사각사각</div>
    <div style="margin-top:2px">
      <div class="field"><label>소리 · 모양</label><input class="input" id="onomat" maxlength="12" value="사각사각" /></div>
      <div class="sagak-preview" id="sagakPrev">사각사각</div>
    </div>
    <div class="foot actions"><button class="btn primary" id="saveCard">카드 저장</button><button class="btn ghost" onclick="reset('cover')">처음으로</button></div>
    <canvas id="cardCanvas" width="1080" height="1080" style="display:none"></canvas>`}),

  jetteul: () => ({ crumb:'序文 › <b class="old">제 ᄠᅳ들</b>', html:`
    <div class="label">제 ᄠᅳ들 · 情</div>
    <div class="display">하고 싶던 말</div>
    <p class="muted" style="margin-top:14px; line-height:1.6">대나무숲과 진심. 혐오표현은 올릴 때 걸러지고, 신고된 글은 즉시 숨겨진 뒤 검토된다.</p>
    <div class="foot"><span class="soon">다음 단계에서 열림</span></div>`}),

  nallo: () => ({ crumb:'序文 › <b class="old">날로 ᄡᅮ메 便安킈</b>', html:`
    <div class="label">날로 ᄡᅮ메 便安킈 · 便</div>
    <div class="display">매일 한 글자</div>
    <p class="muted" style="margin-top:14px; line-height:1.6">매일 주어진 글자를 써서 올리면 모아서 만들어 준다. 챌린지.</p>
    <div class="foot"><span class="soon">다음 단계에서 열림</span></div>`}),
};

const WIRE = {
  font_upload: (el) => {
    const fileInput=el.querySelector('#file'), drop=el.querySelector('#drop'), buildBtn=el.querySelector('#buildBtn');
    const fname=el.querySelector('#fname'), status=el.querySelector('#status'); let chosen=[];
    drop.onclick=()=>fileInput.click();
    ['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('over');}));
    ['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('over');}));
    drop.addEventListener('drop',ev=>{if(ev.dataTransfer.files.length)setF(ev.dataTransfer.files);});
    fileInput.onchange=()=>{if(fileInput.files.length)setF(fileInput.files);};
    function setF(l){chosen=[...l]; fname.textContent=chosen.length===1?chosen[0].name:`${chosen.length}개`; buildBtn.disabled=false;}
    buildBtn.onclick=async()=>{
      buildBtn.disabled=true; status.innerHTML='<div class="note info">처리 중…</div>';
      const fd=new FormData(); chosen.forEach(f=>fd.append('files',f));
      fd.append('family', el.querySelector('#family').value||'내손글씨'); fd.append('fmt', el.querySelector('#fmt').value);
      try{ const res=await fetch('/api/build',{method:'POST',body:fd}); const d=await res.json();
        if(!res.ok) throw new Error(d.detail||'실패');
        go('font_result',{url:`/api/font/${d.id}`,family:d.family,filled:d.filled_cells,total:d.total_cells,syllables:d.syllables});
      }catch(e){ status.innerHTML=`<div class="note err">⚠ ${e.message}</div>`; buildBtn.disabled=false; }
    };
  },
  font_result: (el,ctx) => { const f=new FontFace(ctx.family,`url(${ctx.url})`); f.load().then(x=>{document.fonts.add(x); el.querySelector('#preview').style.fontFamily=`"${ctx.family}"`;}); },
  sagak: (el) => {
    const inp=el.querySelector('#onomat'), prev=el.querySelector('#sagakPrev');
    inp.oninput=()=>{prev.textContent=inp.value||'사각사각';};
    el.querySelector('#saveCard').onclick=async()=>{
      const t=inp.value||'사각사각'; await document.fonts.ready;
      const cv=el.querySelector('#cardCanvas'), c=cv.getContext('2d');
      c.fillStyle='#0a0a0a'; c.fillRect(0,0,1080,1080); c.fillStyle='#fafafa'; c.textAlign='center'; c.textBaseline='middle';
      let s=260; c.font=`900 ${s}px Paperlogy`; while(c.measureText(t).width>900&&s>60){s-=10;c.font=`900 ${s}px Paperlogy`;}
      c.fillText(t,540,520); c.fillStyle='#737373'; c.font='500 30px Paperlogy'; c.fillText('사맛디 · 2026 한글날',540,960);
      const a=document.createElement('a'); a.href=cv.toDataURL('image/png'); a.download=`${t}.png`; a.click();
    };
  },
};

reset('cover');
</script>
</body>
</html>
