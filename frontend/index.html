<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>2026 한글날</title>
<style>
  @font-face{font-family:"Paperlogy";font-weight:100;src:url("/assets/fonts/Paperlogy-1Thin.ttf") format("truetype");font-display:swap;}
  @font-face{font-family:"Paperlogy";font-weight:400;src:url("/assets/fonts/Paperlogy-4Regular.ttf") format("truetype");font-display:swap;}
  @font-face{font-family:"Paperlogy";font-weight:500;src:url("/assets/fonts/Paperlogy-5Medium.ttf") format("truetype");font-display:swap;}
  @font-face{font-family:"Paperlogy";font-weight:700;src:url("/assets/fonts/Paperlogy-7Bold.ttf") format("truetype");font-display:swap;}
  @font-face{font-family:"Paperlogy";font-weight:900;src:url("/assets/fonts/Paperlogy-9Black.ttf") format("truetype");font-display:swap;}
  @font-face{font-family:"OldHangul";src:url("/assets/fonts/oldhangul.woff2") format("woff2");font-display:swap;}

  :root{
    --canvas:#f5f5f5;--paper:#fff;--surface:#fafafa;--ink:#0a0a0a;--ink-soft:#171717;
    --mid:#737373;--hairline:#e5e5e5;--ember:#e7000b;--r-card:24px;--r-btn:18px;--r-nested:10px;
    --font:"Paperlogy",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --old:"OldHangul","함초롬바탕","AppleMyungjo","Batang",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--font);color:var(--ink);background:var(--canvas);-webkit-font-smoothing:antialiased;
    line-height:1.5;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow-x:hidden;}
  .backdrop{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .backdrop b{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font);
    font-weight:900;font-size:min(62vw,900px);color:#ececec;letter-spacing:-.05em;white-space:nowrap;user-select:none;}
  .brandmark{position:fixed;top:20px;left:24px;z-index:2;font-weight:900;font-size:14px;letter-spacing:-.02em;color:var(--ink);}
  .brandmark i{color:var(--ember);font-style:normal;}
  .window{position:relative;z-index:1;width:100%;max-width:640px;min-height:min(78dvh,700px);background:var(--paper);
    border:1px solid var(--hairline);border-radius:var(--r-card);
    box-shadow:0 1px 2px rgba(0,0,0,.04),0 12px 40px -12px rgba(0,0,0,.22),0 0 0 1px rgba(23,23,23,.04);
    padding:40px 40px 32px;display:flex;flex-direction:column;}
  @media(max-width:560px){.window{padding:26px 20px;min-height:84dvh;}body{padding:10px;}}
  .navrow{display:flex;align-items:center;gap:8px;min-height:28px;margin-bottom:20px;}
  .back{background:none;border:0;color:var(--mid);font-family:var(--font);font-size:14px;cursor:pointer;padding:4px 6px;border-radius:8px;}
  .back:hover{background:var(--canvas);color:var(--ink);}
  .crumbs{font-size:13px;color:var(--mid);}.crumbs b{color:var(--ink);font-weight:500;}
  .body{flex:1;display:flex;flex-direction:column;}
  .step{animation:rise .3s cubic-bezier(.2,.7,.2,1);flex:1;display:flex;flex-direction:column;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .label{font-size:12px;letter-spacing:.08em;color:var(--mid);text-transform:uppercase;margin-bottom:14px;}
  .display{font-weight:900;letter-spacing:-.04em;line-height:1.08;font-size:clamp(30px,6.5vw,46px);}
  .old{font-family:var(--old);}
  .cover-year{font-weight:100;font-size:clamp(40px,9vw,72px);letter-spacing:-.03em;line-height:1;}
  .cover-day{font-weight:900;font-size:clamp(60px,16vw,132px);letter-spacing:-.05em;line-height:.92;}
  .lead{font-family:var(--old);font-size:18px;color:var(--ink-soft);line-height:1.95;margin-top:18px;word-break:keep-all;}
  .lead .hl{border-bottom:2px solid var(--ember);padding-bottom:1px;}
  .muted{color:var(--mid);font-size:14px;}
  .btn{font-family:var(--font);font-weight:500;font-size:15px;border:0;cursor:pointer;border-radius:var(--r-btn);
    padding:12px 20px;display:inline-flex;align-items:center;gap:8px;text-decoration:none;transition:transform .08s,background .15s;}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--ink);color:#fafafa;}.btn.primary:hover{background:#000;}
  .btn.ghost{background:var(--canvas);color:var(--ink);}.btn.ghost:hover{background:#ececec;}
  .btn.lg{padding:15px 22px;font-size:16px;}.btn:disabled{opacity:.45;cursor:default;}
  .foot{margin-top:auto;padding-top:24px;}.actions{display:flex;gap:10px;flex-wrap:wrap;}
  .choices{display:flex;flex-direction:column;gap:12px;margin-top:6px;}
  .choice{width:100%;text-align:left;background:var(--paper);border:1px solid var(--hairline);border-radius:var(--r-nested);
    padding:18px 20px;cursor:pointer;transition:border-color .15s,background .15s;}
  .choice:hover{border-color:var(--ink);background:var(--surface);}
  .choice .ct{display:flex;align-items:baseline;justify-content:space-between;gap:12px;}
  .choice .title{font-family:var(--old);font-weight:900;font-size:26px;letter-spacing:-.02em;}
  .choice .num{font-size:12px;color:var(--mid);}
  .choice .sub{color:var(--mid);font-size:13px;margin-top:5px;line-height:1.5;word-break:keep-all;}
  /* square infographic thumbnails */
  .thumbs{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px;}
  @media(max-width:560px){.thumbs{grid-template-columns:1fr;}}
  .thumb{aspect-ratio:1/1;display:flex;flex-direction:column;background:var(--paper);border:1px solid var(--hairline);
    border-radius:var(--r-card);padding:20px;cursor:pointer;transition:border-color .15s,transform .1s,background .15s;}
  .thumb:hover{border-color:var(--ink);transform:translateY(-3px);background:var(--surface);}
  .thumb .art{flex:1;display:flex;align-items:center;justify-content:center;}
  .thumb .tt{font-weight:900;font-size:22px;letter-spacing:-.02em;margin-top:8px;}
  .thumb .ts{color:var(--mid);font-size:13px;margin-top:4px;line-height:1.45;word-break:keep-all;}
  .thumb .go{color:var(--ember);font-size:13px;font-weight:700;margin-top:10px;}
  /* 3-step strip */
  .flow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:18px 0;}
  .flowc{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-nested);padding:14px 10px;text-align:center;}
  .flowc .n{width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fafafa;font-size:12px;font-weight:600;
    display:inline-flex;align-items:center;justify-content:center;margin-bottom:8px;}
  .flowc .t{font-size:13px;font-weight:500;line-height:1.4;word-break:keep-all;}
  /* animated slide carousel */
  .carousel{position:relative;overflow:hidden;border:1px solid var(--hairline);border-radius:var(--r-card);background:var(--surface);margin:6px 0 16px;}
  .track{display:flex;transition:transform .55s cubic-bezier(.2,.7,.2,1);}
  .slide{min-width:100%;padding:30px 24px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;}
  .slide .art{height:150px;display:flex;align-items:center;justify-content:center;}
  .slide .cap{font-weight:700;font-size:19px;letter-spacing:-.02em;}
  .slide .ssub{color:var(--mid);font-size:13px;line-height:1.5;word-break:keep-all;}
  .dots{display:flex;gap:7px;justify-content:center;padding-bottom:16px;}
  .dots i{width:7px;height:7px;border-radius:50%;background:var(--hairline);cursor:pointer;transition:background .2s,width .2s;}
  .dots i.on{background:var(--ink);width:18px;border-radius:4px;}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes flash{0%,100%{opacity:0}50%{opacity:1}}
  .anim-bob{animation:bob 1.6s ease-in-out infinite;}
  .anim-flash{animation:flash 1.8s ease-in-out infinite;}
  /* pen-draws-a-square upload loader (straight strokes = "written by hand") */
  .penwrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:20px 0;}
  .penload{width:92px;height:92px;overflow:visible;}
  .pl-line{stroke-dasharray:100;stroke-dashoffset:100;animation:pldraw 1.9s linear infinite;}
  @keyframes pldraw{from{stroke-dashoffset:100}to{stroke-dashoffset:0}}
  .pl-pen{offset-path:path('M25 25 L95 25 L95 95 L25 95 Z');offset-rotate:auto;animation:plmove 1.9s linear infinite;}
  @keyframes plmove{from{offset-distance:0%}to{offset-distance:100%}}
  .penmsg{color:var(--mid);font-size:14px;}
  /* photo gallery */
  .gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px;overflow-y:auto;max-height:46dvh;padding-right:2px;}
  .gcard{position:relative;border:1px solid var(--hairline);border-radius:var(--r-nested);overflow:hidden;background:var(--surface);}
  .gcard img{width:100%;display:block;}
  .gcard .bar{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;font-size:13px;}
  .gcard .like{background:none;border:0;cursor:pointer;color:var(--mid);font-size:13px;padding:2px;}
  .gcard .like.on{color:var(--ember);}
  .gcard .rep{background:none;border:0;cursor:pointer;color:var(--mid);font-size:12px;}
  .gcard .rep:hover{color:var(--ember);}
  .rank{position:absolute;top:8px;left:8px;background:var(--ink);color:#fafafa;font-size:12px;font-weight:700;padding:2px 9px;border-radius:12px;z-index:1;}
  /* photo cropper (rotate + free crop) */
  .cropper{position:absolute;inset:0;z-index:9;background:var(--paper);border-radius:var(--r-card);display:flex;flex-direction:column;padding:20px;}
  .crop-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .crop-stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--surface);border-radius:var(--r-nested);}
  .crop-imgwrap{position:relative;line-height:0;}
  .crop-imgwrap canvas{max-width:100%;max-height:54dvh;display:block;touch-action:none;}
  .crop-box{position:absolute;border:2px solid var(--ember);box-shadow:0 0 0 9999px rgba(0,0,0,.4);cursor:move;touch-action:none;}
  .crop-h{position:absolute;width:18px;height:18px;background:#fff;border:2px solid var(--ember);border-radius:50%;touch-action:none;}
  .crop-h.tl{left:-10px;top:-10px;cursor:nwse-resize;}.crop-h.tr{right:-10px;top:-10px;cursor:nesw-resize;}
  .crop-h.bl{left:-10px;bottom:-10px;cursor:nesw-resize;}.crop-h.br{right:-10px;bottom:-10px;cursor:nwse-resize;}
  .crop-foot{display:flex;gap:10px;margin-top:12px;}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .field label{font-size:13px;color:var(--mid);}
  .input,select,textarea{font-family:var(--font);font-size:15px;color:var(--ink);background:var(--canvas);
    border:1px solid transparent;border-radius:var(--r-btn);padding:11px 14px;outline:none;width:100%;}
  textarea{min-height:120px;resize:vertical;line-height:1.6;}
  .input:focus,select:focus,textarea:focus{border-color:var(--hairline);background:var(--paper);}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .subcard{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-nested);padding:16px 18px;margin-top:8px;}
  .drop{border:2px dashed var(--hairline);border-radius:var(--r-nested);padding:22px;text-align:center;color:var(--mid);cursor:pointer;font-size:14px;}
  .drop.over{border-color:var(--ink);background:var(--surface);}
  .note{margin-top:12px;padding:11px 14px;border-radius:var(--r-nested);font-size:14px;}
  .note.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
  .note.err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
  .note.info{background:var(--canvas);border:1px solid var(--hairline);color:var(--mid);}
  #preview{font-size:30px;min-height:100px;border:1px dashed var(--hairline);border-radius:var(--r-nested);padding:16px;margin-top:14px;outline:none;line-height:1.6;}
  .sagak-preview{min-height:140px;display:flex;align-items:center;justify-content:center;border:1px solid var(--hairline);
    border-radius:var(--r-nested);background:var(--surface);margin-top:14px;font-weight:900;font-size:clamp(34px,10vw,64px);letter-spacing:-.03em;padding:14px;word-break:keep-all;}
  .postlist{display:flex;flex-direction:column;gap:10px;margin-top:14px;overflow-y:auto;max-height:38dvh;padding-right:4px;}
  .post{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--r-nested);padding:14px 16px;}
  .post p{font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
  .post .rep{margin-top:8px;font-size:12px;color:var(--mid);background:none;border:0;cursor:pointer;padding:2px 0;}
  .post .rep:hover{color:var(--ember);}
  .soon{display:inline-block;background:var(--ink-soft);color:#fafafa;font-size:12px;padding:3px 10px;border-radius:18px;margin-top:14px;}
  .streak{font-weight:900;font-size:44px;letter-spacing:-.03em;}
  svg{display:block;}
</style>
</head>
<body>
  <div class="backdrop"><b>한글</b></div>
  <div class="window"><div class="navrow" id="nav"></div><div class="body" id="stage"></div></div>

<script>
const stage=document.getElementById('stage'), nav=document.getElementById('nav');
let stack=[];
function go(id,ctx){stack.push({id,ctx:ctx||{}});render();}
function back(){if(stack.length>1){stack.pop();render();}}
function reset(id){stack=[{id,ctx:{}}];render();}
function cur(){return stack[stack.length-1];}
function render(){
  if(window.__auto){clearInterval(window.__auto);window.__auto=null;}
  const {id,ctx}=cur(); const s=STEPS[id](ctx);
  nav.innerHTML=(stack.length>1?`<button class="back" onclick="back()">←</button>`:'')+`<span class="crumbs">${s.crumb||''}</span>`;
  stage.innerHTML=''; const el=document.createElement('div'); el.className='step'; el.innerHTML=s.html;
  stage.appendChild(el); if(WIRE[id])WIRE[id](el,ctx);
}
async function api(url,opts){const r=await fetch(url,opts);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||'오류');return d;}
const esc=s=>String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));

// ---- 손글씨 사진: 촬영/선택 → 회전 + 자유 크롭 → JPEG data URL (키보드 없음) ----
function pickPhoto(cb){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.setAttribute('capture','environment');
  inp.onchange=()=>{ if(inp.files[0]) openCropper(inp.files[0],cb); };
  inp.click();
}
function openCropper(file,cb){
  const img=new Image();
  img.onload=()=>{
    const MAXW=1600, sc=Math.min(1,MAXW/Math.max(img.width,img.height));
    let work=document.createElement('canvas'); work.width=Math.round(img.width*sc); work.height=Math.round(img.height*sc);
    work.getContext('2d').drawImage(img,0,0,work.width,work.height);
    const ov=document.createElement('div'); ov.className='cropper';
    ov.innerHTML=`<div class="crop-head"><button class="btn ghost" id="crRot">↻ 회전</button>
      <div class="row"><button class="btn ghost" id="crCancel">취소</button><button class="btn primary" id="crOk">확인</button></div></div>
      <div class="crop-stage"><div class="crop-imgwrap" id="crWrap"></div></div>`;
    document.querySelector('.window').appendChild(ov);
    const wrap=ov.querySelector('#crWrap'); let box;
    const dispScale=()=>work.getBoundingClientRect().width/work.width;
    function layout(){const s=dispScale(),b=ov.querySelector('#crBox');if(!b)return;
      b.style.left=box.x*s+'px';b.style.top=box.y*s+'px';b.style.width=box.w*s+'px';b.style.height=box.h*s+'px';}
    function mount(){
      wrap.innerHTML=''; wrap.appendChild(work);
      box={x:work.width*0.08,y:work.height*0.08,w:work.width*0.84,h:work.height*0.84};
      const b=document.createElement('div'); b.className='crop-box'; b.id='crBox';
      b.innerHTML='<div class="crop-h tl"></div><div class="crop-h tr"></div><div class="crop-h bl"></div><div class="crop-h br"></div>';
      wrap.appendChild(b); bindDrag(b); requestAnimationFrame(layout);
    }
    function bindDrag(b){
      let mode=null,sx,sy,ob;
      const start=(e,m)=>{mode=m;sx=e.clientX;sy=e.clientY;ob={...box};e.preventDefault();e.stopPropagation();
        window.addEventListener('pointermove',move);window.addEventListener('pointerup',end);};
      const move=(e)=>{const s=dispScale(),dx=(e.clientX-sx)/s,dy=(e.clientY-sy)/s;let n={...ob};
        if(mode==='move'){n.x=ob.x+dx;n.y=ob.y+dy;}
        else{if(mode.includes('l')){n.x=ob.x+dx;n.w=ob.w-dx;}if(mode.includes('r'))n.w=ob.w+dx;
             if(mode.includes('t')){n.y=ob.y+dy;n.h=ob.h-dy;}if(mode.includes('b'))n.h=ob.h+dy;}
        n.w=Math.max(40,n.w);n.h=Math.max(40,n.h);
        n.x=Math.max(0,Math.min(n.x,work.width-n.w));n.y=Math.max(0,Math.min(n.y,work.height-n.h));
        n.w=Math.min(n.w,work.width-n.x);n.h=Math.min(n.h,work.height-n.y);box=n;layout();};
      const end=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',end);mode=null;};
      b.addEventListener('pointerdown',e=>start(e,'move'));
      ['tl','tr','bl','br'].forEach(m=>b.querySelector('.'+m).addEventListener('pointerdown',e=>start(e,m)));
    }
    ov.querySelector('#crRot').onclick=()=>{const c=document.createElement('canvas');c.width=work.height;c.height=work.width;
      const x=c.getContext('2d');x.translate(c.width,0);x.rotate(Math.PI/2);x.drawImage(work,0,0);work=c;mount();};
    ov.querySelector('#crCancel').onclick=()=>{window.removeEventListener('resize',layout);ov.remove();};
    ov.querySelector('#crOk').onclick=()=>{
      const CAP=1000,s=Math.min(1,CAP/Math.max(box.w,box.h)),out=document.createElement('canvas');
      out.width=Math.round(box.w*s);out.height=Math.round(box.h*s);
      out.getContext('2d').drawImage(work,box.x,box.y,box.w,box.h,0,0,out.width,out.height);
      const data=out.toDataURL('image/jpeg',0.85);window.removeEventListener('resize',layout);ov.remove();cb(data);};
    mount(); window.addEventListener('resize',layout);
  };
  img.src=URL.createObjectURL(file);
}
function uid(){let u=localStorage.getItem('sm_uid');if(!u){u='u'+Math.random().toString(36).slice(2,10);localStorage.setItem('sm_uid',u);}return u;}

// infographic SVGs (thin stroke, monochrome + ember)
const ART={
  font:`<svg width="120" height="120" viewBox="0 0 120 120" fill="none" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <rect x="18" y="20" width="46" height="58" rx="6"/><path d="M28 34h26M28 46h26M28 58h16"/>
    <path d="M70 62l24 24" stroke="#e7000b"/><path d="M92 58l14 14-8 8-14-14z" fill="#fff"/>
    <text x="82" y="44" font-family="Paperlogy" font-weight="900" font-size="30" stroke="none" fill="#0a0a0a">가</text></svg>`,
  sagak:`<svg width="120" height="120" viewBox="0 0 120 120" fill="none" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 60h10M30 44v32M42 34v52M54 50v20" stroke="#e7000b"/>
    <path d="M70 60h36M88 42v36" /><text x="66" y="96" font-family="Paperlogy" font-weight="900" font-size="22" stroke="none" fill="#0a0a0a">쿵</text></svg>`,
};

// pen draws a square with straight strokes = "you wrote it by hand" (upload loader)
const PEN=`<div class="penwrap"><svg class="penload" viewBox="0 0 120 120" fill="none">
  <path class="pl-line" d="M25 25 L95 25 L95 95 L25 95 Z" stroke="#0a0a0a" stroke-width="4" stroke-linejoin="miter" pathLength="100"/>
  <path class="pl-pen" d="M0 0 L10 4 L4 10 Z" fill="#e7000b"/></svg><div class="penmsg">올리는 중…</div></div>`;

// font-maker explainer slides (pdf → 스캔/촬영 → 업로드), animated
const SLIDES=[
  {cap:"① 글자 템플릿",sub:"정해진 글자만 또박또박 쓰면 됩니다",art:`
    <svg width="150" height="150" viewBox="0 0 150 150" fill="none" stroke="#0a0a0a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <rect x="42" y="24" width="66" height="90" rx="6"/><path d="M54 44h42M54 60h42M54 76h28"/>
      <rect x="86" y="86" width="20" height="20" rx="3" stroke="#e7000b"/>
      <text x="96" y="102" font-family="Paperlogy" font-weight="900" font-size="15" stroke="none" fill="#e7000b" text-anchor="middle">가</text></svg>`},
  {cap:"② 스캔 · 촬영",sub:"다 쓴 종이를 스캔하거나 폰으로 찍어요",art:`

const WIRE={
  font_intro:(el)=>{
    const track=el.querySelector('#track'), dots=[...el.querySelectorAll('#dots i')]; let i=0;
    function show(n){i=(n+SLIDES.length)%SLIDES.length; track.style.transform=`translateX(-${i*100}%)`; dots.forEach((d,k)=>d.classList.toggle('on',k===i));}
    dots.forEach(d=>d.onclick=()=>{show(+d.dataset.i); window.__auto&&clearInterval(window.__auto); window.__auto=setInterval(()=>show(i+1),2600);});
    window.__auto=setInterval(()=>show(i+1),2600);
  },
  font_upload:(el)=>{
    const fi=el.querySelector('#file'),drop=el.querySelector('#drop'),bb=el.querySelector('#buildBtn'),fn=el.querySelector('#fname'),st=el.querySelector('#status');let ch=[];
    drop.onclick=()=>fi.click();
    ['dragover','dragenter'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add('over');}));
    ['dragleave','drop'].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove('over');}));
    drop.addEventListener('drop',ev=>{if(ev.dataTransfer.files.length)sf(ev.dataTransfer.files);});
    fi.onchange=()=>{if(fi.files.length)sf(fi.files);};
    function sf(l){ch=[...l];fn.textContent=ch.length===1?ch[0].name:`${ch.length}개`;bb.disabled=false;}
    bb.onclick=async()=>{bb.disabled=true;st.innerHTML=PEN;
      const fd=new FormData();ch.forEach(f=>fd.append('files',f));fd.append('family',el.querySelector('#family').value||'내손글씨');fd.append('fmt',el.querySelector('#fmt').value);
      try{const d=await api('/api/build',{method:'POST',body:fd});go('font_result',{url:`/api/font/${d.id}`,family:d.family,filled:d.filled_cells,total:d.total_cells,syllables:d.syllables});}
      catch(e){st.innerHTML=`<div class="note err">⚠ ${e.message}</div>`;bb.disabled=false;}};
  },
  font_result:(el,ctx)=>{const f=new FontFace(ctx.family,`url(${ctx.url})`);f.load().then(x=>{document.fonts.add(x);el.querySelector('#preview').style.fontFamily=`"${ctx.family}"`;});},
  sagak:(el)=>{
    const inp=el.querySelector('#onomat'),pv=el.querySelector('#sagakPrev');
    inp.oninput=()=>{pv.textContent=inp.value||'사각사각';};
    el.querySelector('#saveCard').onclick=async()=>{const t=inp.value||'사각사각';await document.fonts.ready;
      const cv=el.querySelector('#cardCanvas'),c=cv.getContext('2d');c.fillStyle='#0a0a0a';c.fillRect(0,0,1080,1080);
      c.fillStyle='#fafafa';c.textAlign='center';c.textBaseline='middle';let s=260;c.font=`900 ${s}px Paperlogy`;
      while(c.measureText(t).width>900&&s>60){s-=10;c.font=`900 ${s}px Paperlogy`;}c.fillText(t,540,520);
      c.fillStyle='#737373';c.font='500 30px Paperlogy';c.fillText('사맛디 · 2026 한글날',540,960);
      const a=document.createElement('a');a.href=cv.toDataURL('image/png');a.download=`${t}.png`;a.click();};
  },
  posts:(el,ctx)=>{
    const list=el.querySelector('#plist'),st=el.querySelector('#pstatus');
    async function load(){try{const d=await api(`/api/posts/${ctx.kind}`);list.innerHTML=d.posts.map(p=>
      `<div class="gcard"><img src="${p.image}" loading="lazy"><div class="bar"><span class="muted">익명</span><button class="rep" onclick="reportPost(${p.id},this)">신고</button></div></div>`).join('')||'<div class="muted">아직 없어요. 처음으로 남겨보세요.</div>';}catch(e){}}
    el.querySelector('#up').onclick=()=>pickPhoto(async data=>{st.innerHTML=PEN;
      try{await api('/api/posts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({kind:ctx.kind,image:data})});
        st.innerHTML='<div class="note ok">올렸어요</div>';load();}catch(e){st.innerHTML=`<div class="note err">⚠ ${e.message}</div>`;}});
    load();
  },
  nallo:(el)=>{
    const wall=el.querySelector('#wall'),st=el.querySelector('#cstatus'),tab=el.querySelector('#tabBtn');let top=false;
    api('/api/challenge/today').then(d=>{el.querySelector('#prompt').textContent=d.prompt;});
    const card=(e,rank)=>`<div class="gcard">${rank?`<div class="rank">${rank}위</div>`:''}<img src="${e.image}" loading="lazy">
      <div class="bar"><span class="muted">${esc(e.prompt||'')}</span><button class="like" onclick="likeC(${e.id},this)">♥ ${e.likes||0}</button></div></div>`;
    async function loadWall(){try{const d=await api('/api/challenge/wall');wall.innerHTML=d.entries.map(e=>card(e)).join('')||'<div class="muted">첫 기록을 남겨보세요.</div>';}catch(e){}}
    async function loadTop(){try{const d=await api('/api/challenge/top');wall.innerHTML=d.top.map((e,i)=>card(e,i+1)).join('')||'<div class="muted">아직 없어요.</div>';}catch(e){}}
    tab.onclick=()=>{top=!top;tab.textContent=top?'전체 보기':'🏆 Top 3';top?loadTop():loadWall();};
    el.querySelector('#up').onclick=()=>pickPhoto(async data=>{st.innerHTML=PEN;
      try{const d=await api('/api/challenge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({who:uid(),image:data})});
        st.innerHTML=`<div class="note ok">🔥 ${d.streak}일째 · 올렸어요</div>`;top=false;tab.textContent='🏆 Top 3';loadWall();}
      catch(e){st.innerHTML=`<div class="note err">⚠ ${e.message}</div>`;}});
    loadWall();
  },
  admin:(el)=>{
    const q=el.querySelector('#queue'),st=el.querySelector('#qstatus');
    let token='';
    async function load(){token=el.querySelector('#token').value;st.textContent='불러오는 중…';
      try{const d=await api(`/api/admin/queue?token=${encodeURIComponent(token)}`);st.textContent='';
        q.innerHTML=d.queue.map(p=>`<div class="gcard"><img src="${p.image}" loading="lazy"><div class="bar"><span class="muted">신고 ${p.reports} · ${p.kind}</span></div>
          <div class="row" style="padding:0 10px 10px"><button class="btn ghost" onclick="mod(${p.id},true,this)">허용</button><button class="btn ghost" style="color:var(--ember)" onclick="mod(${p.id},false,this)">삭제</button></div></div>`).join('')||'<div class="muted">검토할 글이 없습니다.</div>';}
      catch(e){st.textContent='';alert(e.message);}}
    window.mod=async(id,allow,btn)=>{const fd=new FormData();fd.append('allow',allow);fd.append('token',token);
      try{await api(`/api/admin/posts/${id}/moderate`,{method:'POST',body:fd});btn.closest('.gcard,.post').remove();}catch(e){alert(e.message);}};
    el.querySelector('#loadQ').onclick=load;
  },
};
window.reportPost=async(id,btn)=>{if(!confirm('이 글을 신고할까요? 즉시 숨겨집니다.'))return;try{await api(`/api/posts/${id}/report`,{method:'POST'});btn.closest('.gcard,.post').remove();}catch(e){alert(e.message);}};
window.likeC=async(id,btn)=>{try{const d=await api(`/api/challenge/${id}/like`,{method:'POST'});btn.classList.add('on');btn.textContent='♥ '+d.likes;}catch(e){}};

if(location.hash==='#admin') reset('admin'); else reset('cover');
</script>
